    <figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br></pre></td><td class="code"><pre><span class="line">作者：labuladong</span><br><span class="line">链接：https://zhuanlan.zhihu.com/p/83334559</span><br><span class="line">来源：知乎</span><br><span class="line">著作权归作者所有。商业转载请联系作者获得授权，非商业转载请注明出处。</span><br><span class="line"></span><br><span class="line">public class KMP &#123;</span><br><span class="line">    private int[][] dp;</span><br><span class="line">    private String pat;</span><br><span class="line"></span><br><span class="line">    public KMP(String pat) &#123;</span><br><span class="line">        this.pat = pat;</span><br><span class="line">        int M = pat.length();</span><br><span class="line">        // dp[状态][字符] = 下个状态</span><br><span class="line">        dp = new int[M][256];</span><br><span class="line">        // base case</span><br><span class="line">        dp[0][pat.charAt(0)] = 1;</span><br><span class="line">        // 影子状态 X 初始为 0</span><br><span class="line">        int X = 0;</span><br><span class="line">        // 构建状态转移图（稍改的更紧凑了）</span><br><span class="line">        for (int j = 1; j &lt; M; j++) &#123;</span><br><span class="line">            for (int c = 0; c &lt; 256; c++) &#123;</span><br><span class="line">                dp[j][c] = dp[X][c];</span><br><span class="line">            dp[j][pat.charAt(j)] = j + 1;</span><br><span class="line">            // 更新影子状态</span><br><span class="line">            X = dp[X][pat.charAt(j)];</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    public int search(String txt) &#123;</span><br><span class="line">        int M = pat.length();</span><br><span class="line">        int N = txt.length();</span><br><span class="line">        // pat 的初始态为 0</span><br><span class="line">        int j = 0;</span><br><span class="line">        for (int i = 0; i &lt; N; i++) &#123;</span><br><span class="line">            // 计算 pat 的下一个状态</span><br><span class="line">            j = dp[j][txt.charAt(i)];</span><br><span class="line">            // 到达终止态，返回结果</span><br><span class="line">            if (j == M) return i - M + 1;</span><br><span class="line">        &#125;</span><br><span class="line">        // 没到达终止态，匹配失败</span><br><span class="line">        return -1;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
